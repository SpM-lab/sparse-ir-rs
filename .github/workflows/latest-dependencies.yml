name: Rust Latest Dependencies

on:
  schedule:
    # Weekly on Monday at 12:00 JST.
    - cron: "0 3 * * 1"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-latest-dependencies:
    runs-on: ubuntu-latest
    name: Rust with latest compatible dependencies

    steps:
      - uses: actions/checkout@v7
        with:
          submodules: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install OpenBLAS
        run: |
          sudo apt-get update
          sudo apt-get install -y libopenblas-dev pkg-config

      - name: Update dependency lockfile
        run: cargo update

      - name: Run tests with latest compatible dependencies
        run: cargo test --all-targets --release --locked
