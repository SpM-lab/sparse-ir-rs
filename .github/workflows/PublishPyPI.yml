name: Publish to PyPI

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

jobs:
  publish-pypi:
    uses: ./.github/workflows/publish-pypi-reusable.yml
    with:
      release_ref: ${{ github.ref_name }}
